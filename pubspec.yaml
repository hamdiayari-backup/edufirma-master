name: edufirma
description: A Flutter project for Edufirma LMS platform
publish_to: "none"

version: 17.0.0+17

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # --- UI / Animations / Icons ---
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  iconsax: ^0.0.8
  lottie: ^3.1.3
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.1
  flutter_rating_bar: ^4.0.1
  fl_chart: ^0.68.0
  confetti: ^0.7.0

  # --- Network / HTTP / API ---
  dio: ^5.9.0
  http: ^1.6.0

  # --- Firebase / Push ---
  firebase_core: ^3.14.0
  firebase_messaging: ^15.2.9
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1

  # --- Auth / Google Sign-In ---
  # --- Storage / Local DB / Cache ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  open_file: ^3.3.2

  # --- State management / DI ---
  provider: ^6.1.5
  get_it: ^7.7.0

  # --- Media / Image / Video ---
  image_picker: ^1.1.2
  video_player: ^2.9.5

  # --- Web / URL / WebView / Share ---
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  share_plus: ^7.2.2

  # --- Internationalisation ---
  intl: ^0.20.2

  # --- Widgets ---
  carousel_slider: ^4.2.1
  flutter_svg: ^2.1.0

  # --- Security (Android screen capture block) ---
  flutter_windowmanager: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
